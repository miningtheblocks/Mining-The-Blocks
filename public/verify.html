<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Mining The Blocks — Verificación de email</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      max-width: 440px;
      width: 100%;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
      padding: 32px 32px 24px;
      text-align: center;
      border-bottom: 1px solid #2a2a2a;
    }
    .header .icon { font-size: 40px; margin-bottom: 10px; }
    .header h1 { color: #fff; font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
    .header p { color: #666; font-size: 13px; margin-top: 6px; }
    .body { padding: 36px 32px 32px; text-align: center; }
    .status-icon { font-size: 52px; margin-bottom: 16px; }
    .title { color: #fff; font-size: 20px; font-weight: 800; margin-bottom: 10px; }
    .subtitle { color: #aaa; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .highlight { color: #22c55e; font-weight: 700; }
    .steps {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px 20px;
      text-align: left;
      margin-top: 8px;
    }
    .steps p { color: #888; font-size: 12px; margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
    .steps ol { padding-left: 20px; }
    .steps li { color: #ccc; font-size: 14px; line-height: 1.8; }
    .error-box {
      background: #1a0a0a;
      border: 1px solid #4a1a1a;
      border-radius: 10px;
      padding: 16px 20px;
      margin-top: 8px;
    }
    .error-box span { color: #f87171; font-size: 14px; line-height: 1.6; }
    .footer {
      padding: 14px 32px 20px;
      border-top: 1px solid #1e1e1e;
      text-align: center;
    }
    .footer p { color: #333; font-size: 11px; margin-top: 4px; }
    .spinner {
      display: inline-block;
      width: 36px; height: 36px;
      border: 3px solid #2a2a2a;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">&#9935;</div>
      <h1>Mining The Blocks</h1>
      <p>Verificaci&#243;n de cuenta</p>
    </div>

    <div class="body" id="body-content">
      <!-- Loading shown by default; JS replaces content -->
      <div class="spinner"></div>
      <p class="subtitle">Verificando tu email&hellip;</p>
    </div>

    <div class="footer">
      <p>&copy; 2025 Mining The Blocks</p>
      <p>Si no creaste esta cuenta, ignor&#225; este email.</p>
    </div>
  </div>

  <script>
    var API_KEY = 'AIzaSyDRCpXkNWupz2PmoOG6XcuFENYaU5xIUps';

    function getParam(name) {
      var search = window.location.search;
      var re = new RegExp('[?&]' + name + '=([^&]*)');
      var m = search.match(re);
      return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : null;
    }

    // SEC-C1: showSuccess y showError construyen DOM via createElement/textContent
    // en vez de innerHTML para impedir XSS desde error.message del API de Google
    // (controlable indirectamente por el oobCode del query string).
    function el(tag, opts) {
      var node = document.createElement(tag);
      if (opts && opts.cls) node.className = opts.cls;
      if (opts && opts.text != null) node.textContent = opts.text;
      if (opts && opts.html != null) node.innerHTML = opts.html; // sólo para entities estáticas (✅, ❌)
      if (opts && opts.style) node.setAttribute('style', opts.style);
      return node;
    }

    function clearBody() {
      var body = document.getElementById('body-content');
      while (body.firstChild) body.removeChild(body.firstChild);
      return body;
    }

    function showSuccess() {
      var body = clearBody();
      body.appendChild(el('div', { cls: 'status-icon', html: '&#9989;' }));
      body.appendChild(el('p', { cls: 'title', text: '¡Email verificado!' }));

      var sub = el('p', { cls: 'subtitle' });
      sub.appendChild(document.createTextNode('Tu cuenta está activa. '));
      sub.appendChild(el('span', { cls: 'highlight', text: 'Ya podés iniciar sesión' }));
      sub.appendChild(document.createTextNode(' en la app.'));
      body.appendChild(sub);

      var steps = el('div', { cls: 'steps' });
      steps.appendChild(el('p', { text: 'Próximos pasos' }));
      var ol = el('ol');
      var li1 = el('li');
      li1.appendChild(document.createTextNode('Abrí la app '));
      li1.appendChild(el('strong', { text: 'Mining The Blocks', style: 'color:#fff' }));
      ol.appendChild(li1);
      var li2 = el('li');
      li2.appendChild(document.createTextNode('Tocá '));
      li2.appendChild(el('strong', { text: '"Iniciar sesión"', style: 'color:#fff' }));
      li2.appendChild(document.createTextNode(' en la pantalla de registro'));
      ol.appendChild(li2);
      ol.appendChild(el('li', { text: 'Ingresá con tu email y contraseña' }));
      steps.appendChild(ol);
      body.appendChild(steps);
    }

    function showError(msg) {
      var body = clearBody();
      body.appendChild(el('div', { cls: 'status-icon', html: '&#10060;' }));
      body.appendChild(el('p', { cls: 'title', text: 'No se pudo verificar' }));
      var box = el('div', { cls: 'error-box' });
      box.appendChild(el('span', { text: String(msg == null ? '' : msg) }));
      body.appendChild(box);
    }

    var mode = getParam('mode');
    var oobCode = getParam('oobCode');

    if (!mode || !oobCode) {
      showError('Link inválido. Pedí uno nuevo desde la app tocando "Reenviar email".');
    } else if (mode !== 'verifyEmail') {
      showError('Acción no reconocida. Pedí un nuevo link de verificación desde la app.');
    } else {
      fetch(
        'https://identitytoolkit.googleapis.com/v1/accounts:update?key=' + API_KEY,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ oobCode: oobCode })
        }
      )
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.error) {
          var code = (data.error.message || '').toString();
          if (code === 'EXPIRED_OOB_CODE') {
            showError('El link expiró. Pedí uno nuevo desde la app tocando "Reenviar email".');
          } else if (code === 'INVALID_OOB_CODE') {
            showError('El link ya fue usado o no es válido. Pedí uno nuevo desde la app.');
          } else if (code === 'USER_DISABLED') {
            showError('Esta cuenta fue deshabilitada. Contactá soporte.');
          } else {
            showSuccess();
          }
        } else {
          showSuccess();
        }
      })
      .catch(function() {
        showError('Error de red. Verificá tu conexión e intentá de nuevo.');
      });
    }
  </script>
</body>
</html>
